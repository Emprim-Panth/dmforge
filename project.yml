name: DMForge
options:
  bundleIdPrefix: com.forgecode
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: F75F8Z9ZPZ
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIStatusBarHidden: true

targets:
  DMForge:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forgecode.dmforge
        INFOPLIST_KEY_CFBundleDisplayName: "DM Forge"
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
